<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Day Tracker</title>
    <style>
        :root { 
            --bg-h: 222; --bg-s: 10%; --bg-l: 5%;
            --acc-h: 161; --acc-s: 10%; --acc-l: 20%;
            --bg: hsl(var(--bg-h), var(--bg-s), var(--bg-l));
            --card: #1e293b; 
            --accent: hsl(var(--acc-h), var(--acc-s), var(--acc-l));
            --text: #f8fafc; --dim: #64748b; 
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; transition: all 0.5s ease; }
        h1 { color: var(--accent); font-weight: 300; letter-spacing: 2px; text-transform: uppercase; margin: 20px 0; transition: color 0.5s; }
        
        .entry-box { background: var(--card); padding: 30px; border-radius: 24px; text-align: center; width: 100%; max-width: 340px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box; }
        .question { font-size: 1.1rem; color: var(--dim); margin-bottom: 10px; display: block; }
        
        .score-display { font-size: 4rem; font-weight: bold; color: var(--accent); transition: color 0.5s; }
        #status { font-size: 0.8rem; color: var(--dim); height: 20px; margin-top: -10px; margin-bottom: 10px; }

        .slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #334155; outline: none; margin: 30px 0; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 32px; height: 32px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 4px solid var(--bg); transition: background 0.5s; }
        
        .calendar-container { width: 100%; max-width: 340px; margin-top: 30px; background: var(--card); padding: 15px; border-radius: 20px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-label { font-size: 0.7rem; color: var(--dim); text-align: center; margin-bottom: 5px; }
        .day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.8rem; border-radius: 8px; background: rgba(255,255,255,0.03); position: relative; }
        .day.today { border: 1px solid var(--accent); }
        .day-num { font-size: 0.6rem; color: var(--dim); position: absolute; top: 4px; left: 4px; }
        .score-val { font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1 id="mainTitle">Good Day</h1>

    <div class="entry-box">
        <span class="question">How is it going?</span>
        <div id="scoreDisplay" class="score-display">5</div>
        <div id="status">Adjust to rate</div>
        <input type="range" min="0" max="10" value="5" class="slider" id="scoreSlider">
    </div>

    <div class="calendar-container">
        <div class="grid" id="calendarGrid">
            <div class="day-label">S</div><div class="day-label">M</div><div class="day-label">T</div>
            <div class="day-label">W</div><div class="day-label">T</div>
