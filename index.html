<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Good Day</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #10b981; --text: #f8fafc; --dim: #64748b; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        h1 { color: var(--accent); font-weight: 300; letter-spacing: 2px; text-transform: uppercase; margin: 20px 0; }
        
        .entry-box { background: var(--card); padding: 30px; border-radius: 24px; text-align: center; width: 100%; max-width: 340px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box; }
        .question { font-size: 1.1rem; color: var(--dim); margin-bottom: 10px; display: block; }
        
        .score-display { font-size: 4rem; font-weight: bold; color: var(--accent); transition: transform 0.1s; }
        #status { font-size: 0.8rem; color: var(--dim); height: 20px; margin-top: -10px; margin-bottom: 10px; }

        .slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: #334155; outline: none; margin: 30px 0; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 32px; height: 32px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 4px solid var(--bg); box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        
        /* Calendar */
        .calendar-container { width: 100%; max-width: 340px; margin-top: 30px; background: var(--card); padding: 15px; border-radius: 20px; box-sizing: border-box; }
        .cal-header { font-weight: bold; color: var(--dim); margin-bottom: 15px; text-align: center; font-size: 0.9rem; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-label { font-size: 0.7rem; color: var(--dim); text-align: center; margin-bottom: 5px; }
        .day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.8rem; border-radius: 8px; background: rgba(255,255,255,0.03); position: relative; }
        .day.today { border: 1px solid var(--accent); }
        .day-num { font-size: 0.6rem; color: var(--dim); position: absolute; top: 4px; left: 4px; }
        .score-val { font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>Good Day</h1>

    <div class="entry-box">
        <span class="question">How is it going?</span>
        <div id="scoreDisplay" class="score-display">5</div>
        <div id="status">Adjust to rate</div>
        <input type="range" min="0" max="10" value="5" class="slider" id="scoreSlider">
    </div>

    <div class="calendar-container">
        <div class="cal-header" id="monthYear"></div>
        <div class="grid" id="calendarGrid">
            <div class="day-label">S</div><div class="day-label">M</div><div class="day-label">T</div>
            <div class="day-label">W</div><div class="day-label">T</div><div class="day-label">F</div><div class="day-label">S</div>
        </div>
    </div>

    <script>
        const getDateKey = () => new Date().toLocaleDateString('en-CA');
        const slider = document.getElementById('scoreSlider');
        const display = document.getElementById('scoreDisplay');
        const status = document.getElementById('status');
        let moodHistory = JSON.parse(localStorage.getItem('moodHistory')) || {};

        // Load existing today's score if it exists
        const today = getDateKey();
        if (moodHistory[today] !== undefined) {
            slider.value = moodHistory[today];
            display.innerText = moodHistory[today];
            status.innerText = "Updated";
        }

        slider.addEventListener('input', () => {
            const val = slider.value;
            display.innerText = val;
            
            // Auto-save
            moodHistory[today] = parseInt(val);
            localStorage.setItem('moodHistory', JSON.stringify(moodHistory));
            
            status.innerText = "Saved";
            renderCalendar();
        });

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const labels = grid.querySelectorAll('.day-label');
            grid.innerHTML = '';
            labels.forEach(l => grid.appendChild(l));

            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            document.getElementById('monthYear').innerText = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

            for (let d = 1; d <= daysInMonth; d++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day';
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const score = moodHistory[dateStr];

                if (dateStr === today) dayDiv.classList.add('today');
                if (score !== undefined) {
                    dayDiv.style.background = `rgba(16, 185, 129, ${score / 15 + 0.15})`;
                    dayDiv.innerHTML = `<span class="day-num">${d}</span><span class="score-val">${score}</span>`;
                } else {
                    dayDiv.innerHTML = `<span class="day-num">${d}</span>`;
                }
                grid.appendChild(dayDiv);
            }
        }

        renderCalendar();
    </script>
</body>
</html>
